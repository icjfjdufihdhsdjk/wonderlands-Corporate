<!DOCTYPE html>
<html>
<head>
  <title>Dream Entry Systems - Employee Portal</title>
  <meta charset="UTF-8">

  <style>
    body {
      margin: 0;
      background: #d6d6d6;
      font-family: Arial, Verdana, sans-serif;
      font-size: 13px;
      color: #111;
    }

    .container {
      width: 900px;
      margin: 20px auto;
      background: white;
      border: 1px solid #444;
      box-shadow: 4px 4px 0 #777;
    }

    .topbar {
      background: #222;
      color: #eee;
      padding: 5px 10px;
      font-size: 11px;
      text-align: right;
    }

    .header {
      background: linear-gradient(#ffffff, #cfcfcf);
      padding: 14px;
      border-bottom: 2px solid #222;
    }

    .logo {
      font-size: 26px;
      font-weight: bold;
      font-family: Georgia;
    }

    .nav {
      background: #e8e8e8;
      padding: 7px;
      text-align: center;
      border-bottom: 1px solid #aaa;
    }

    .button {
      padding: 4px 9px;
      margin: 2px;
      background: #f5f5f5;
      border: 2px outset #ddd;
      cursor: pointer;
    }

    .main {
      display: flex;
      padding: 10px;
      gap: 10px;
    }

    .sidebar {
      width: 200px;
      background: #f1f1f1;
      border: 1px solid #aaa;
      padding: 8px;
    }

    .content {
      flex: 1;
      border: 1px solid #999;
      padding: 12px;
      min-height: 400px;
    }

    .status {
      background: black;
      color: #66ff66;
      font-family: monospace;
      padding: 10px;
      margin: 10px 0;
    }

    .log {
      background: #111;
      color: #ccc;
      font-family: monospace;
      padding: 10px;
      margin: 10px 0;
    }
  </style>
</head>

<body>

<!-- 🔒 PASSWORD GATE -->
<div id="gate" style="
position:fixed;
inset:0;
background:#d6d6d6;
z-index:9999;
display:flex;
justify-content:center;
align-items:center;
">

  <div style="background:white;padding:30px;border:1px solid #777;box-shadow:0 0 20px rgba(0,0,0,0.3);">

    <h2>Employee Access Required</h2>

    <input id="password" type="password" placeholder="Password">
    <button onclick="checkPass()">Enter</button>

    <div id="error" style="color:red;margin-top:10px;"></div>

  </div>
</div>

<div class="container">

  <div class="topbar">
    Employee Network | DES-PRIVATE
  </div>

  <div class="header">
    <div class="logo">Dream Entry Systems</div>
  </div>

  <div class="nav">
    <span class="button" onclick="showPage('home')">Home</span>
    <span class="button" onclick="showPage('manual')">Manual</span>
    <span class="button" onclick="showPage('rooms')">Rooms</span>
    <span class="button" onclick="showPage('logs')">Logs</span>
  </div>

  <div class="main">

    <div class="sidebar">
      <b>System Status</b><br><br>
      Portal: ONLINE<br>
      Backup: PARTIAL<br>
      Camera Link: ACTIVE<br>
      W-04: UNLISTED
    </div>

    <div id="content" class="content"></div>

  </div>

</div>

<script>

function checkPass() {
  const pass = document.getElementById("password").value;
  const error = document.getElementById("error");

  if (pass === "Dream Entry") {
    document.getElementById("gate").style.display = "none";
    showPage("home");
  } else {
    error.innerHTML = "ACCESS DENIED";
  }
}

function showPage(page) {
  const content = document.getElementById("content");

  if (page === "home") {
    content.innerHTML = `
      <h2>Employee Portal</h2>

      <div class="status">
        USER STATUS: ACTIVE<br>
        LAST UPDATE: 12/11/2005<br>
        SYSTEM MODE: ARCHIVE
      </div>

      <p>Internal employee system restored from backup.</p>
    `;
  }

  if (page === "manual") {
    content.innerHTML = `
      <h2>Employee Manual</h2>

      <div class="log">
        Do not enter unassigned rooms.<br><br>
        Do not follow voices.<br><br>
        If a door opens onto an unknown space, leave it open.<br><br>
        Do not speak to anyone visible through it.
      </div>
    `;
  }

  if (page === "rooms") {
    content.innerHTML = `
      <h2>Room Index</h2>

      <div class="log">
        A-01: Reception<br>
        B-12: Storage (door open)<br>
        C-07: Break room<br>
        W-04: No data found
      </div>
    `;
  }

  if (page === "logs") {
    content.innerHTML = `
      <h2>System Logs</h2>

      <div class="log">
        [03:12] Backup started<br>
        [03:14] External store locked<br>
        [03:19] Door left open<br>
        [03:21] Room W-04 detected<br>
        [03:22] Employee detected<br>
        [03:22] Employee not found
      </div>
    `;
  }
}

</script>

</body>
</html>
